name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Validate production build
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          PREVIEW_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4173/ > /dev/null; then
              break
            fi
            sleep 1
          done
          INIT_VALIDATE_URL=http://127.0.0.1:4173/ npm run validate-init
          kill $PREVIEW_PID

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
